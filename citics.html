<!DOCTYPE html><html><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1,user-scalable=yes"><title>REITs - 中信证券</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f8f4ee 0%,#efe8dc 50%,#e8e0d5 100%);color:#2d2d2d;min-height:100vh}.hdr{background:linear-gradient(135deg,#c41230,#8b0000);padding:12px 16px;border-bottom:2px solid #d4c8b8;text-align:center}.hdr h1{color:#fff;font-size:18px;margin:0}.hdr .sub{color:rgba(255,255,255,.85);font-size:11px;margin-top:3px}.main{padding:10px;max-width:900px;margin:0 auto}.stats{display:flex;gap:8px;margin-bottom:10px}.sc{background:#ffffff;border:1px solid #d4c8b8;border-radius:8px;padding:8px 12px;flex:1;text-align:center}.sc .n{font-size:20px;font-weight:700;color:#c41230}.sc .l{font-size:10px;color:#888}.tb{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}.tb span,.tb a{padding:6px 14px;border:1px solid #d4c8b8;background:#ffffff;color:#888;border-radius:16px;cursor:pointer;font-size:12px;text-decoration:none}.tb span.on,.tb a.on{background:#c41230;color:#fff;border-color:#c41230}.tb button{padding:6px 12px;background:#8b0020;color:#fff;border:none;border-radius:16px;font-size:12px;cursor:pointer}input{padding:8px 12px;background:#ffffff;border:1px solid #d4c8b8;border-radius:8px;color:#2d2d2d;font-size:12px;outline:none;flex:1;min-width:100px}.cat{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}.cat span{padding:5px 12px;border:1px solid #d4c8b8;background:#ffffff;color:#888;border-radius:14px;cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0}.cat span.on{background:#fdf0f0;color:#c41230;border-color:#c41230}table{width:100%;border-collapse:collapse;background:#ffffff;border-radius:8px;overflow:hidden}th{background:#faf7f2;color:#555;padding:10px 8px;text-align:left;font-size:12px;border-bottom:2px solid #d4c8b8}td{padding:8px;border-bottom:1px solid #e8e0d5;font-size:12px;vertical-align:top}tr:hover{background:#fdf0f0}a{color:#c41230;text-decoration:none}.nt{background:#c41230;color:#fff;border-radius:3px;padding:1px 5px;font-size:9px;margin-left:4px}.lv-r{border-left:3px solid #c41230}.lv-o{border-left:3px solid #d4956a}.lv-s{border-left:3px solid #c41230}.star{cursor:pointer;font-size:14px;user-select:none}.star.on{color:#c41230}.star.off{color:#999}.toast{position:fixed;bottom:20px;left:10px;right:10px;background:#c41230;border:1px solid #c41230;border-radius:10px;padding:12px 16px;z-index:999;color:#fff;font-size:13px;text-align:center;display:none}.ft{text-align:center;color:#bbb;font-size:10px;padding:15px}.em{text-align:center;padding:40px;color:#999}@media(max-width:600px){td{font-size:11px;padding:6px 4px}th{font-size:10px;padding:8px 4px}}</style></head><body><div class=hdr><div style=display:flex;align-items:center;justify-content:center;gap:10px><span style=font-size:12px;color:rgba(255,255,255,.6);font-weight:300;letter-spacing:4px>CITIC SECURITIES</span></div><h1>REITs 公告监控</h1><div class=sub id=status>Loading...</div><div style=margin-top:4px;font-size:10px><a href=http://www.sse.com.cn/reits/announcements/info/ target=_blank style=color:rgba(255,255,255,.85)>上交所REITs</a> | <a href=http://reits.szse.cn/disclosure/index.html target=_blank style=color:rgba(255,255,255,.85)>深交所REITs</a></div></div><div style=height:60px;background:linear-gradient(180deg,#8b0000,#c41230);position:relative;overflow:hidden><svg viewBox="0 0 500 60" preserveAspectRatio="none" style=position:absolute;bottom:0;left:0;width:100%;height:60px><g fill=none stroke=rgba(255,255,255,.35) stroke-width=1.5><path d="M230,10 L230,55 M270,10 L270,55 M240,20 L240,25 M260,20 L260,25 M235,30 L235,50 M265,30 L265,50 M245,15 L245,20 M255,15 L255,20 M250,0 L250,10 M240,5 L260,5"/><rect x=245 y=12 width=10 height=3 rx=1/><polygon points="245,0 250,-5 255,0"/><rect x=180 y=25 width=30 height=30 rx=2/><rect x=290 y=20 width=25 height=35 rx=2/><rect x=130 y=30 width=35 height=25 rx=2/><rect x=325 y=28 width=28 height=27 rx=2/><rect x=80 y=38 width=25 height=17 rx=1/><rect x=360 y=35 width=20 height=20 rx=1/><rect x=60 y=42 width=18 height=13 rx=1/><rect x=385 y=40 width=15 height=15 rx=1/></g></svg></div><div class=main><div class=stats><div class=sc><div class=n id=tdn style=color:#c41230>-</div><div class=l>今日</div></div><div class=sc><div class=n id=tmn style=color:#c41230>-</div><div class=l>明日</div></div><div class=sc><div class=n id=sn>-</div><div class=l>SSE</div></div><div class=sc><div class=n id=zn>-</div><div class=l>SZSE</div></div><div class=sc><div class=n id=nn style=color:#c41230>-</div><div class=l>New</div></div></div><div style=text-align:center;color:#888;font-size:11px;margin-bottom:8px id=upt>--</div><div class=tb><span class=on onclick="st('all')">全部</span><span onclick="st('red')">重要</span><span onclick="st('ora')">关注</span><span onclick="st('fav')">收藏</span><span onclick="st('sse')">上交所</span><span onclick="st('szse')">深交所</span><span onclick="st('new')">待读</span><input placeholder=搜索... id=q oninput=rd()><button onclick=mr()>标记已读</button></div><div class=cat id=cb></div><div id=content><div class=em>Loading...</div></div><div class=ft>REITs 公告监控</div></div><div class=toast id=to><span id=tm></span><span onclick="this.parentElement.style.display='none'" style=margin-left:10px;color:#888;cursor:pointer>x</span></div>
<script>
var D={s:[],z:[]},tb="all",cf="all",seen=JSON.parse(localStorage.getItem("vb")||"{}"),favs=JSON.parse(localStorage.getItem("fv")||"{}");
var CS=[{k:"op",l:"运营数据",w:["运营","经营"],lv:"n"},{k:"rp",l:"定期报告",w:["年报","半年报","季度报告","年度报告","中期报告"],lv:"r"},{k:"dv",l:"收益分配",w:["分红","收益分配","派息"],lv:"r"},{k:"pd",l:"产品文件",w:["招募","基金合同","产品资料","托管协议"],lv:"o"},{k:"ip",l:"发售上市",w:["发售","上市","询价","配售"],lv:"o"},{k:"mt",l:"持有人大会",w:["持有人大会","投票"],lv:"o"},{k:"mg",l:"管理人变更",w:["管理人","基金经理"],lv:"o"},{k:"nv",l:"净值估值",w:["净值","估值"],lv:"o"},{k:"tr",l:"交易提示",w:["交易提示","停牌","复牌","风险提示"],lv:"r"},{k:"ma",l:"重大事项",w:["资产收购","资产处置","关联交易","重大事项","扩募","解除限售"],lv:"r"},{k:"ir",l:"投资者关系",w:["开放日","说明会"],lv:"n"},{k:"lg",l:"法律意见",w:["法律意见书","律师事务所","核查"],lv:"n"},{k:"ot",l:"其他",w:[],lv:"n"}];
function cls(t){for(var i=0;i<CS.length;i++){var c=CS[i];if(!c.w.length)continue;for(var j=0;j<c.w.length;j++)if(t.indexOf(c.w[j])>=0)return c.k}return"ot"}
function clb(k){for(var i=0;i<CS.length;i++)if(CS[i].k===k)return CS[i].l;return k}
function clv(k){for(var i=0;i<CS.length;i++)if(CS[i].k===k)return CS[i].lv;return"n"}
function rd(){var all=D.s.concat(D.z);
if(tb==="sse")all=D.s;else if(tb==="szse")all=D.z;else if(tb==="new")all=all.filter(function(i){return !seen[i.id]});else if(tb==="red")all=all.filter(function(i){return clv(i.cat)==="r"||favs[i.id]});else if(tb==="ora")all=all.filter(function(i){return clv(i.cat)==="o"||favs[i.id]});else if(tb==="fav")all=all.filter(function(i){return favs[i.id]});
if(cf!=="all")all=all.filter(function(i){return i.cat===cf});
var q=document.getElementById("q").value.toLowerCase();if(q)all=all.filter(function(i){return(i.code+i.name+i.title).toLowerCase().indexOf(q)>=0});
all.sort(function(a,b){return b.date.localeCompare(a.date)});
var nd=[];all.forEach(function(i){if(!seen[i.id])nd.push(i)});
document.getElementById("nn").textContent=nd.length;
if(nd.length>0&&localStorage.getItem("vb")){document.getElementById("tm").textContent=nd.length+" new";document.getElementById("to").style.display="block";setTimeout(function(){document.getElementById("to").style.display="none"},8000)}
var cm={};all.forEach(function(i){cm[i.cat]=(cm[i.cat]||0)+1});
var h="<span class=cp"+(cf==="all"?" on":"")+" onclick=sc('all')>全部("+all.length+")</span>";
CS.forEach(function(c){if(cm[c.k])h+="<span class=cp"+(cf===c.k?" on":"")+" onclick=sc('"+c.k+"')>"+c.l+"<span class=cnt>"+cm[c.k]+"</span></span>"});
document.getElementById("cb").innerHTML=h;
document.getElementById("status").textContent="SSE:"+D.s.length+" SZSE:"+D.z.length;
document.getElementById("sn").textContent=D.s.length;document.getElementById("zn").textContent=D.z.length;
if(!all.length){document.getElementById("content").innerHTML="<div class=em>暂无公告</div>";return}
document.getElementById("content").innerHTML="<table><tr><th>C</th><th>Name</th><th>Title</th><th>Date</th><th>Type</th><th></th></tr>"+all.map(function(i){var nw=!seen[i.id];var lv=clv(i.cat);if(favs[i.id])lv="s";var sc=favs[i.id]?"star on":"star off";return"<tr class=lv-"+lv+"><td><b style=color:"+(i.ex==="SSE"?"#c41230":"#c41230")+">"+i.ex+"</b> "+i.code+(nw?"<span class=nt>NEW</span>":"")+"</td><td>"+i.name+"</td><td><a href='"+i.url+"' target=_blank>"+i.title+"</a></td><td>"+i.date+"</td><td style=color:#c41230;font-size:11px>"+clb(i.cat)+"</td><td><span class='"+sc+"' data-fid='"+i.id+"'>★</span></td></tr>"}).join("")+"</table>"}
function sc(k){cf=k;rd()}
function mr(){var all=D.s.concat(D.z);all.forEach(function(i){seen[i.id]=1});localStorage.setItem("vb",JSON.stringify(seen));rd()}
function fv(id){if(favs[id]){delete favs[id]}else{favs[id]=1};localStorage.setItem("fv",JSON.stringify(favs));rd()}
function st(t){tb=t;document.querySelectorAll(".tb span").forEach(function(b){b.classList.remove("on")});event.target.classList.add("on");rd()}
document.addEventListener("click",function(e){var el=e.target.closest("[data-fid]");if(el){var id=el.getAttribute("data-fid");fv(id)}});
var dn=0;function ck(){if(++dn<2)return;D.s.forEach(function(i){i.cat=cls(i.title);i.id=encodeURIComponent(i.code+i.date+i.title.substring(0,20))});D.z.forEach(function(i){i.cat=cls(i.title);i.id=encodeURIComponent((i.code||"")+(i.date||"")+(i.title||"").substring(0,30))});var all=D.s.concat(D.z);all.forEach(function(i){if(!seen[i.id])seen[i.id]=1});var td=new Date();var ts=td.getFullYear()+"-"+String(td.getMonth()+1).padStart(2,"0")+"-"+String(td.getDate()).padStart(2,"0");var tdc=all.filter(function(i){return i.date===ts}).length;var tm=new Date(td.getTime()+86400000);var tms=tm.getFullYear()+"-"+String(tm.getMonth()+1).padStart(2,"0")+"-"+String(tm.getDate()).padStart(2,"0");var tmc=all.filter(function(i){return i.date===tms}).length;document.getElementById("tdn").textContent=tdc;document.getElementById("tmn").textContent=tmc;var pad=function(n){return String(n).padStart(2,"0")};document.getElementById("upt").textContent="更新 "+pad(td.getHours())+":"+pad(td.getMinutes())+":"+pad(td.getSeconds());localStorage.setItem("vb",JSON.stringify(seen));rd()};
fetch("/api/sse?pageSize=50").then(function(r){return r.json()}).then(function(d){D.s=(d.pageHelp.data||[]).map(function(i){var u=i.url||"";if(u&&!u.startsWith("http"))u="https://www.sse.com.cn"+u;return{code:i.securityCode||"",name:i.fundExtAbbr||i.fundAbbr||"",title:i.title||"",date:i.sseDate||"",url:u,ex:"SSE"}});ck()}).catch(function(e){document.getElementById("status").textContent="SSE:"+e.message;ck()});
fetch("/api/szse?pageSize=50").then(function(r){return r.json()}).then(function(d){D.z=(d.data||[]).map(function(i){var u=i.attachPath||"";if(u&&!u.startsWith("http"))u="https://disc.static.szse.cn"+u;return{code:i.secCode||"",name:i.secName||"",title:i.title||"",date:i.publishTime?i.publishTime.substring(0,10):"",url:u,ex:"SZSE"}});ck()}).catch(function(e){document.getElementById("status").textContent="SZSE:"+e.message;ck()});
</script></body></html>
