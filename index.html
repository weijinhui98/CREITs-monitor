<!DOCTYPE html><html><head><meta charset="UTF-8"><title>REITs Diag</title>
<style>body{background:#111;color:#fff;font:16px monospace;padding:20px}
.ok{color:#0f0}.fail{color:#f00}.wait{color:#ff0}</style></head>
<body>
<h2>REITs Diagnostic</h2>
<div id="s1">Step1: Loading page... <span class="wait">OK</span></div>
<div id="s2">Step2: Call /api/sse...</div>
<div id="s3">Step3: Call /api/szse...</div>
<div id="s4">Step4: Render table...</div>
<script>
var D={sse:[],szse:[]},done=0,total=2;

function step(id,msg,cls){
    var ok=cls||'ok';
    document.getElementById(id).innerHTML=msg+' <span class="'+ok+'">'+(ok==='ok'?'OK':'FAIL')+'</span>';
}

fetch('/api/sse?pageSize=3').then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
}).then(function(t){
    step('s2','Step2: /api/sse ('+t.length+' bytes)');
    try{
        var d=JSON.parse(t);
        D.sse=(d.pageHelp.data||[]).map(function(i){return{code:i.securityCode||'',name:i.fundExtAbbr||'',title:i.title||'',date:i.sseDate||'',url:(i.url||'').startsWith('http')?i.url:'https://www.sse.com.cn'+(i.url||''),ex:'SSE'};});
        step('s2','Step2: SSE='+D.sse.length+' items');
        if(++done>=total)render();
    }catch(e){step('s2','Step2: JSON parse err: '+e.message,'fail')}
}).catch(function(e){step('s2','Step2: '+e.message,'fail')});

fetch('/api/szse?pageSize=3').then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
}).then(function(t){
    step('s3','Step3: /api/szse ('+t.length+' bytes)');
    try{
        var d=JSON.parse(t);
        D.szse=(d.data||[]).map(function(i){return{code:i.secCode||'',name:i.secName||'',title:i.title||'',date:i.publishTime?i.publishTime.substring(0,10):'',url:'https://disc.static.szse.cn'+(i.attachPath||''),ex:'SZSE'};});
        step('s3','Step3: SZSE='+D.szse.length+' items');
        if(++done>=total)render();
    }catch(e){step('s3','Step3: JSON parse err: '+e.message,'fail')}
}).catch(function(e){step('s3','Step3: '+e.message,'fail')});

function render(){
    var all=D.sse.concat(D.szse);
    step('s4','Step4: Total='+all.length+' announcements');
    if(!all.length)return;
    var h='<hr><table border=1 cellpadding=5 style=border-collapse:collapse>';
    h+='<tr><th>Ex</th><th>Code</th><th>Title</th><th>Date</th></tr>';
    all.forEach(function(i){
        h+='<tr><td>'+i.ex+'</td><td>'+i.code+'</td><td><a href="'+i.url+'" target=_blank style=color:#5cf>'+i.title+'</a></td><td>'+i.date+'</td></tr>';
    });
    h+='</table>';
    document.getElementById('s4').innerHTML='Step4: '+all.length+' items'+h;
}
</script></body></html>
