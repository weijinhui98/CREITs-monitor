<!DOCTYPE html><html><head><meta charset="UTF-8"><title>REITs Diag</title>
<style>body{background:#111;color:#fff;font:16px monospace;padding:20px}
.ok{color:#0f0}.fail{color:#f00}.wait{color:#ff0}
.stats{display:flex;gap:8px;margin:10px 0}
.sc{background:#162530;border:1px solid #2a4a5a;border-radius:8px;padding:8px 12px;flex:1;text-align:center}
.sc .n{font-size:20px;font-weight:700;color:#5cf}
.sc .l{font-size:10px;color:#8899aa}
.tb{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tb span{padding:6px 14px;border:1px solid #2a5a7a;background:#162530;color:#8899aa;border-radius:16px;cursor:pointer;font-size:12px}
.tb span.on{background:#1a5a8a;color:#fff;border-color:#3a8ac0}
input{padding:8px 12px;background:#162530;border:1px solid #2a5a7a;border-radius:8px;color:#e0e0e0;font-size:12px;outline:none;flex:1;min-width:100px}
.cat{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.cat span{padding:5px 12px;border:1px solid #2a5a7a;background:#162530;color:#8899aa;border-radius:14px;cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0}
.cat span.on{background:#0d4a6a;color:#5cf;border-color:#2a7aaa}
.nt{background:#f44336;color:#fff;border-radius:3px;padding:1px 5px;font-size:9px;margin-left:4px}
.toast{position:fixed;bottom:20px;left:10px;right:10px;background:#1a3a4a;border:1px solid #3a8ac0;border-radius:10px;padding:12px 16px;z-index:999;color:#fff;font-size:13px;text-align:center;display:none}
.hdr{background:linear-gradient(135deg,#1a3a4a,#0d2130);padding:12px 16px;border-bottom:2px solid #2a5a7a;text-align:center;margin:-8px -8px 10px -8px}
.hdr h1{color:#5cf;font-size:18px;margin:0}
.hdr .sub{color:#8899aa;font-size:11px;margin-top:3px}
</style></head>
<body><div class=hdr><h1>REITs Monitor</h1><div class=sub id=status>Loading...</div></div>
<h2>REITs Diagnostic</h2>
<div class=stats><div class=sc><div class=n id=sn>-</div><div class=l>SSE</div></div><div class=sc><div class=n id=zn>-</div><div class=l>SZSE</div></div><div class=sc><div class=n id=nn style=color:#f44336>-</div><div class=l>New</div></div></div>
<div class=tb><span class=on onclick="st('all')">All</span><span onclick="st('sse')">SSE</span><span onclick="st('szse')">SZSE</span><input placeholder=Search... id=q oninput=rd()></div>
<div class=cat id=cb></div>
<div id="s1">Step1: Loading page... <span class="wait">OK</span></div>



<script>
var D={s:[],z:[]},tb="all",cf="all",seen=JSON.parse(localStorage.getItem("va")||"{}");
var CS=[{k:"op",l:"OP",w:["运营","经营"]},{k:"rp",l:"RP",w:["年报","半年报","季度报告"]},{k:"dv",l:"DV",w:["分红","收益分配"]},{k:"pd",l:"PD",w:["招募","基金合同","产品资料"]},{k:"ip",l:"IPO",w:["发售","上市","询价","配售"]},{k:"mt",l:"MT",w:["持有人大会"]},{k:"mg",l:"MG",w:["管理人","基金经理"]},{k:"nv",l:"NAV",w:["净值","估值"]},{k:"tr",l:"TR",w:["交易提示","停牌","复牌","风险"]},{k:"ma",l:"MA",w:["资产收购","资产处置","关联交易","扩募"]},{k:"ir",l:"IR",w:["开放日","说明会"]},{k:"lg",l:"LG",w:["法律意见书","律师事务所"]},{k:"ot",l:"OT",w:[]}];
function cls(t){for(var i=0;i<CS.length;i++){var c=CS[i];if(!c.w.length)continue;for(var j=0;j<c.w.length;j++)if(t.indexOf(c.w[j])>=0)return c.k}return"ot"}
function clb(k){for(var i=0;i<CS.length;i++)if(CS[i].k===k)return CS[i].l;return k}
function rd(){var it=tb==="all"?D.s.concat(D.z):tb==="sse"?D.s:D.z;if(cf!=="all")it=it.filter(function(i){return i.cat===cf});var q=document.getElementById("q").value.toLowerCase();if(q)it=it.filter(function(i){return(i.code+i.name+i.title).toLowerCase().indexOf(q)>=0});it.sort(function(a,b){return b.date.localeCompare(a.date)});var nd=[];it.forEach(function(i){if(!seen[i.id])nd.push(i)});document.getElementById("nn").textContent=nd.length;if(nd.length>0&&localStorage.getItem("va")){document.getElementById("tm").textContent=nd.length+" new";document.getElementById("to").style.display="block";setTimeout(function(){document.getElementById("to").style.display="none"},8000)}var cm={};it.forEach(function(i){cm[i.cat]=(cm[i.cat]||0)+1});var h="<span class=cp"+(cf==="all"?" on":"")+" onclick=sc('all')>All("+it.length+")</span>";CS.forEach(function(c){if(cm[c.k])h+="<span class=cp"+(cf===c.k?" on":"")+" onclick=sc('"+c.k+"')>"+c.l+"<span style=font-size:10px;color:#667788;margin-left:2px>"+cm[c.k]+"</span></span>"});document.getElementById("cb").innerHTML=h;document.getElementById("status").textContent="SSE:"+D.s.length+" SZSE:"+D.z.length;document.getElementById("sn").textContent=D.s.length;document.getElementById("zn").textContent=D.z.length;if(!it.length){document.getElementById("ct").innerHTML="<div style=text-align:center;padding:40px;color:#667788>No results</div>";return}document.getElementById("ct").innerHTML="<table><tr><th>Code</th><th>Name</th><th>Title</th><th>Date</th><th>Type</th></tr>"+it.map(function(i){var nw=!seen[i.id];return"<tr><td><span style=color:"+(i.ex==="SSE"?"#5cf":"#fa0")+">"+i.ex+"</span> "+i.code+(nw?"<span class=nt>NEW</span>":"")+"</td><td>"+i.name+"</td><td><a href='"+i.url+"' target=_blank>"+i.title+"</a></td><td>"+i.date+"</td><td style=color:#fa0;font-size:11px>"+clb(i.cat)+"</td></tr>"}).join("")+"</table>"}
function sc(k){cf=k;rd()}
function st(t){tb=t;document.querySelectorAll(".tb span").forEach(function(b){b.classList.remove("on")});event.target.classList.add("on");rd()}
var dn=0;function ck(){if(++dn<2)return;D.s.forEach(function(i){i.cat=cls(i.title);i.id=btoa(i.code+i.date+i.title.substring(0,20))});D.z.forEach(function(i){i.cat=cls(i.title);i.id=(i.code||"")+(i.date||"")+(i.title||"").substring(0,30)});var all=D.s.concat(D.z);all.forEach(function(i){if(!seen[i.id])seen[i.id]=1});localStorage.setItem("va",JSON.stringify(seen));rd();if("Notification" in window&&Notification.permission==="default"){var b=document.createElement("div");b.style="background:#2a3a1a;border:1px solid #4a6a2a;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;text-align:center";b.innerHTML="<button onclick=Notification.requestPermission();this.parentElement.remove() style=background:#3a6a2a;color:#fff;border:none;padding:4px 12px;border-radius:4px>Enable Notifications</button>";document.querySelector(".main")?document.querySelector(".main").insertBefore(b,document.querySelector(".tb")):0}}
fetch("/api/sse?pageSize=50").then(function(r){return r.json()}).then(function(d){D.s=(d.pageHelp.data||[]).map(function(i){var u=i.url||"";if(u&&!u.startsWith("http"))u="https://www.sse.com.cn"+u;return{code:i.securityCode||"",name:i.fundExtAbbr||i.fundAbbr||"",title:i.title||"",date:i.sseDate||"",url:u,ex:"SSE"}});ck()}).catch(function(e){document.getElementById("status").textContent="SSE: "+e.message;ck()});
fetch("/api/szse?pageSize=50").then(function(r){return r.json()}).then(function(d){D.z=(d.data||[]).map(function(i){var u=i.attachPath||"";if(u&&!u.startsWith("http"))u="https://disc.static.szse.cn"+u;return{code:i.secCode||"",name:i.secName||"",title:i.title||"",date:i.publishTime?i.publishTime.substring(0,10):"",url:u,ex:"SZSE"}});ck()}).catch(function(e){document.getElementById("status").textContent="SZSE: "+e.message;ck()});
</script><div class=toast id=to><span id=tm></span><span onclick="this.parentElement.style.display='none'" style=margin-left:10px;color:#8899aa;cursor:pointer>x</span></div></body></html>
